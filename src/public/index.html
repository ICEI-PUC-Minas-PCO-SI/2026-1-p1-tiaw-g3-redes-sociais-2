<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="registration-container">
        <h1>Adicionar nova tarefa</h1>
        <p>Preencha os detalhes abaixo para organizar sua rotina.</p>

        <form action="#" method="get">
            <div class="input-group">
                <label for="taskName">Nome da Tarefa</label>
                <input type="text" id="taskName" name="taskName" placeholder="Ex: Ler um livro" required>
            </div>

            <div class="input-group">
                <label for="taskTime">Tempo estimado (minutos)</label>
                <input type="number" id="taskTime" name="taskTime" placeholder="Ex: 30" required min="1">
            </div>

            <div class="button-container">
                <button type="reset" class="btn-cancel">Cancelar</button>
                <button type="submit" class="btn-add">Adicionar</button>
            </div>
        </form>
    </div>

</body>
</html>
