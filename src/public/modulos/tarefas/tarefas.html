<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tarefas - OnLife</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="tarefas.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <main class="d-flex flex-grow-1">

    <!-- sidebar -->
    <div class="col-md-2 p-0">
      <div id="sidebar-container"></div>
    </div>

    <section class="container-fluid">

      <h1 class="fw-bold">Tarefas</h1>

      <p class="text-secondary mb-5">
        Organize suas atividades e acompanhe seu progresso
      </p>

      <div class="row g-4">

        <div class="col-md-6">
          <div class="registration-container h-100">
            <h2>Adicionar nova tarefa</h2>
            <p>Preencha os detalhes abaixo para organizar sua rotina.</p>

            <form action="#" method="get">
              <div class="input-group">
                <label for="taskName">Nome da Tarefa</label>
                <input type="text" id="taskName" name="taskName" placeholder="Ex: Ler um livro" required>
              </div>

              <div class="input-group">
                <label for="taskTime">Tempo estimado (minutos)</label>
                <input type="number" id="taskTime" name="taskTime" placeholder="Ex: 30" required min="1">
              </div>

              <div class="button-container">
                <button type="reset" class="btn-cancel">Cancelar</button>
                <button type="submit" class="btn-add">Adicionar</button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-md-6">

          <div class="card shadow-sm p-4">

            <h2 class="mb-4">
              Lista de tarefas
            </h2>

            <ul class="list-group" id="listaTarefas"></ul>

          </div>

        </div>

      </div>

      

    </section>

  </main>

</body>

</html>
