<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tarefas - OnLife</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style-gustavo.css">
</head>

<body class="d-flex flex-column min-vh-100">

  
  <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-2 border-bottom border-dark">

    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
      <img src="assets/images/logo.png" width="50" height="40" class="me-2 mx-3">
      <span class="fs-2 fw-bold">OnLife</span>
    </a>

    <div class="col-md-3 text-end pe-4">
      <button type="button" class="btn btn-dark px-5">
        Sair
      </button>
    </div>

  </header>

  <main class="d-flex flex-grow-1">

    
    <aside>

      <div class="d-flex flex-column flex-shrink-0 p-3 border-end border-dark h-100" style="width: 180px;">

        <ul class="nav nav-pills flex-column mb-auto">

          <li class="nav-item">
            <a href="#" class="nav-link link-dark">
              Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link active bg-secondary-subtle text-dark">
              Tarefas
            </a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link link-dark">
              Cronômetro
            </a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link link-dark">
              Meu Perfil
            </a>
          </li>

        </ul>

      </div>

    </aside>

   
    <section class="container-fluid p-5">

      <h1 class="fw-bold">Tarefas</h1>

      <h4 class="text-secondary mb-5">
        Organize suas atividades e acompanhe seu progresso
      </h4>

      <div class="row g-4">

        
        <div class="col-lg-5">

          <div class="card shadow-sm p-4 h-100">

            <h2 class="mb-4">
              Filtrar tarefas
            </h2>

            <label class="form-label">
              Filtrar por data
            </label>

            <input
              type="date"
              id="filtroData"
              class="form-control"
              onchange="filtrarPorData()"
            >

          </div>

        </div>

        
        <div class="col-lg-7">

          <div class="card shadow-sm p-4">

            <h2 class="mb-4">
              Lista de tarefas
            </h2>

            <ul
              class="list-group"
              id="listaTarefas"
            ></ul>

          </div>

        </div>

      </div>

    </section>

  </main>


  <footer class="bg-dark text-light py-3 mt-auto px-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">

      <div>
        OnLife &copy; 2026. All rights reserved.
      </div>

      <div>
        Redes sociais
      </div>

    </div>

  </footer>

  <script src="assets/js/script-gustavo.js"></script>

</body>
</html>
