<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tarefas - OnLife</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style-gustavo.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <main class="d-flex flex-grow-1">
    
    <!-- sidebar -->
    <div class="col-md-2 p-0">
      <div id="sidebar-container"></div>
    </div>

    <section class="container-fluid p-5">

      <h1 class="fw-bold">Tarefas</h1>

      <h4 class="text-secondary mb-5">
        Organize suas atividades e acompanhe seu progresso
      </h4>

      <div class="row g-4">


        <div class="col-lg-5">

          <div class="card shadow-sm p-4 h-100">

            <h2 class="mb-4">
              Filtrar tarefas
            </h2>

            <label class="form-label">
              Filtrar por data
            </label>

            <input type="date" id="filtroData" class="form-control" onchange="filtrarPorData()">

          </div>

        </div>


        <div class="col-lg-7">

          <div class="card shadow-sm p-4">

            <h2 class="mb-4">
              Lista de tarefas
            </h2>

            <ul class="list-group" id="listaTarefas"></ul>

          </div>

        </div>

      </div>

    </section>

  </main>

</html>
