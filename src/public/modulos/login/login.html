<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OnLife | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <header class="navbar navbar-expand-lg header-custom">

    <div class="container">

      <a class="navbar-brand logo" href="../homepage/homepage.html">
        <img src="../../assets/images/logo_colorida.png" alt="OnLife">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

        <ul class="navbar-nav align-items-lg-center gap-3">

          <li class="nav-item">
            <a class="nav-link" href="../homepage/homepage.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="btn btn-gradient active" href="#">
              Login
            </a>
          </li>

        </ul>

      </div>

    </div>

  </header>


  <section id="login">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-5 col-md-8">

          <div class="login-card">

            <div class="text-center mb-4">

              <h2 class="mt-3">
                Bem-vindo ao <span>OnLife</span>
              </h2>

              <p class="text-muted">
                Monitore seu tempo, organize suas tarefas e alcance suas metas.
              </p>

            </div>


            <form id="login-form">

              <div class="mb-3">

                <label class="form-label">
                  Usuário
                </label>

                <div class="input-group">

                  <span class="input-group-text">

                    <i class="bi bi-person"></i>

                  </span>

                  <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" required>

                </div>

              </div>


              <div class="mb-4">

                <label class="form-label">
                  Senha
                </label>

                <div class="input-group">

                  <span class="input-group-text">

                    <i class="bi bi-lock"></i>

                  </span>

                  <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>

                </div>

              </div>


              <button type="submit" class="btn btn-gradient w-100">

                <i class="bi bi-box-arrow-in-right me-2"></i>

                Entrar

              </button>

            </form>


            <div class="text-center mt-4">

              <span class="text-muted">
                Ainda não possui conta?
              </span>

              <br>

              <button class="btn btn-outline-primary mt-3" data-bs-toggle="modal" data-bs-target="#loginModal">

                Criar conta

              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>


  <div class="modal fade" id="loginModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered modal-lg">

      <div class="modal-content cadastro-modal">

        <div class="modal-header">

          <div>
            <h4 class="modal-title">
              Criar uma conta
            </h4>
          </div>

          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal">
          </button>

        </div>

        <div class="modal-body">

          <form id="cadastro-form">

            <div class="row">

              <div class="col-md-6 mb-3">

                <label class="form-label">
                  Usuário
                </label>

                <div class="input-group">

                  <span class="input-group-text">
                    <i class="bi bi-person"></i>
                  </span>

                  <input type="text" class="form-control" id="txt_login" placeholder="Digite um usuário">

                </div>

              </div>

              <div class="col-md-6 mb-3">

                <label class="form-label">
                  Nome completo
                </label>

                <div class="input-group">

                  <span class="input-group-text">
                    <i class="bi bi-person-badge"></i>
                  </span>

                  <input type="text" class="form-control" id="txt_nome" placeholder="Seu nome">

                </div>

              </div>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <div class="input-group">

                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>

                <input type="email" class="form-control" id="txt_email" placeholder="email@exemplo.com">

              </div>

            </div>

            <div class="row">

              <div class="col-md-6 mb-3">

                <label class="form-label">
                  Senha
                </label>

                <div class="input-group">

                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>

                  <input type="password" class="form-control" id="txt_senha">

                </div>

              </div>

              <div class="col-md-6 mb-3">

                <label class="form-label">
                  Confirmar senha
                </label>

                <div class="input-group">

                  <span class="input-group-text">
                    <i class="bi bi-shield-lock"></i>
                  </span>

                  <input type="password" class="form-control" id="txt_senha2">

                </div>

              </div>

            </div>

          </form>

        </div>

        <div class="modal-footer">

          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">

            Cancelar

          </button>

          <button id="btn_salvar" class="btn btn-gradient">

            <i class="bi bi-person-plus-fill me-2"></i>

            Cadastrar

          </button>

        </div>

      </div>

    </div>

  </div>


  <script src="../../assets/js/login.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
