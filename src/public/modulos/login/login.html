<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OnLife | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <header class="navbar navbar-expand-lg header-custom">

    <div class="container">

      <a class="navbar-brand logo" href="../../index.html">
        <img src="../../assets/images/logo_colorida.png" alt="OnLife">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

        <ul class="navbar-nav align-items-lg-center gap-3">

          <li class="nav-item">
            <a class="nav-link" href="../../index.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="btn btn-gradient active" href="#">
              Login
            </a>
          </li>

        </ul>

      </div>

    </div>

  </header>


  <section id="login">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-5 col-md-8">

          <div class="login-card">

            <div class="text-center mb-4">

              <h2 class="mt-3">
                Bem-vindo ao <span>OnLife</span>
              </h2>

              <p class="text-muted">
                Monitore seu tempo, organize suas tarefas e alcance suas metas.
              </p>

            </div>


            <form id="formLogin">

              <div class="mb-3">

                <label for="loginInput" class="form-label">
                  Usuário
                </label>

                <div class="input-group">

                  <span class="input-group-text">

                    <i class="bi bi-person"></i>

                  </span>

                  <input type="text" id="loginInput" class="form-control" placeholder="Digite seu login" required>

                </div>

              </div>


              <div class="mb-4">

                <label for="senhaInput" class="form-label">
                  Senha
                </label>

                <div class="input-group">

                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input type="password" id="senhaInput" class="form-control" placeholder="Digite sua senha" required>
                </div>
              </div>


              <button type="submit" class="btn btn-gradient w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Entrar
              </button>

            </form>


            <div class="text-center mt-4">

              <span class="text-muted">
                Ainda não possui conta?
              </span>
              <br>

              <a href="../cadastro/cadastro.html" class="btn btn-outline-primary mt-3">
                  Criar conta
              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>



  <script src="../../assets/js/database.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="login.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
