<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <main class="d-flex flex-grow-1">

        <!-- Sidebar -->
        <div class="col-md-2 p-0">
            <div id="sidebar-container"></div>
        </div>

        <!-- Conteúdo -->
        <div class="conteudo-principal">

            <div class="titulo mb-4">
                <h1 id="nomeUsuario">Olá, Usuário!</h1>
                <p>Aqui está um resumo da sua jornada de hoje</p>
            </div>

            <div class="row g-4">

                <!-- Coluna esquerda -->
                <div class="col-12 col-lg-8">

                    <div class="card">
                        <div class="card-body">

                            <h5 class="card-title">
                                Tempo Hoje
                            </h5>

                            <h4 id="tempo-hoje">0 h 0 m</h4>

                            <div class="progress">
                                <div id="barra-progresso"
                                    class="progress-bar"
                                    role="progressbar"
                                    style="width:25%;"
                                    aria-valuenow="25"
                                    aria-valuemin="0"
                                    aria-valuemax="100">
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

                <!-- Coluna direita -->
                <div class="col-12 col-lg-4">

                    <div class="card">
                        <div class="card-body">

                            <h5 class="card-title">
                                <i class="bi bi-journal-text"></i>
                                Conteúdos Recomendados
                            </h5>

                            <select id="filtro-interesse" class="form-select mb-3">
                                <option value="todos">Todos</option>
                            </select>

                            <div id="conteudos-recomendados"></div>

                            <button id="btn-sugerir" class="btn btn-dark">
                                <i class="bi bi-dice-3"></i>
                                Sugerir Conteúdo Aleatório
                            </button>

                            <div id="conteudo-aleatorio"></div>

                        </div>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="../../assets/js/auth.js"></script>
    <script src="../sidebar/sidebar.js"></script>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    
        <script src="../../assets/js/database.js"></script>
        <script src="../../assets/js/storage.js"></script>
        <script src="dashboard.js"></script>
    

</body>

</html>

</html>
