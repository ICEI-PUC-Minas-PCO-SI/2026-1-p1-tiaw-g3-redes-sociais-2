<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnLife - Lugares</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body class="bg-light">

<header class="d-flex justify-content-between align-items-center p-3 border-bottom bg-white">
    <div class="d-flex align-items-center">
        <div style="width:50px;height:40px;background:#ccc;margin-right:10px;"></div>
        <h4 class="m-0">OnLife</h4>
    </div>
    <div>
        <i class="bi bi-person-circle fs-3"></i>
    </div>
</header>

<main class="container py-5">

<section class="mb-5">
    <h1 class="fw-bold">Lugares para se desconectar</h1>
    <p class="text-muted">
        Explore ambientes e atividades offline para reduzir o tempo nas redes sociais.
    </p>
</section>

<section class="row mb-4">

    <div class="col-md-5 mb-3">
        <input type="text" id="busca" class="form-control" placeholder="Pesquisar lugares...">
    </div>

    <div class="col-md-3 mb-3">
        <select id="filtro" class="form-select">
            <option value="">Todas categorias</option>
            <option value="Natureza">Natureza</option>
            <option value="Social">Social</option>
            <option value="Leitura">Leitura</option>
        </select>
    </div>

    <div class="col-md-4 mb-3 d-flex align-items-center">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="somenteFavoritos">
            <label class="form-check-label">Mostrar apenas favoritos</label>
        </div>
    </div>

</section>

<p id="contador" class="text-muted fw-semibold"></p>

<section>
    <div id="lista" class="row g-4"></div>
</section>

</main>

<footer class="bg-dark text-light py-3 px-4 mt-5">
    <div class="d-flex justify-content-between">
        <div>OnLife © 2026</div>
        <div>
            <i class="bi bi-instagram"></i>
            <i class="bi bi-facebook"></i>
            <i class="bi bi-linkedin"></i>
        </div>
    </div>
</footer>

<script src="lugares.js"></script>
</body>
</html>
