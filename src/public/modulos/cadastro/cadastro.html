<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnLife | Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <header class="navbar navbar-expand-lg header-custom">

        <div class="container">

            <a class="navbar-brand logo" href="../homepage/homepage.html">
                <img src="../../assets/images/logo_colorida.png" alt="OnLife">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

                <ul class="navbar-nav align-items-lg-center gap-3">

                    <li class="nav-item">
                        <a class="nav-link" href="../homepage/homepage.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="btn btn-gradient" href="../login/login.html">
                            Login
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </header>


    <section id="cadastro">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-7 col-md-9">

                    <div class="login-card">

                        <div class="text-center mb-4">

                            <h2>
                                Criar sua conta
                            </h2>
                        </div>

                        <form id="formCadastro">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label" for="loginInput">
                                        Usuário
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-person"></i>
                                        </span>

                                        <input type="text" id="loginInput" class="form-control"
                                            placeholder="Digite seu usuário" required>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label" for="nomeInput">
                                        Nome completo
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-person-badge"></i>
                                        </span>

                                        <input type="text" id="nomeInput" class="form-control"
                                            placeholder="Seu nome completo" required>

                                    </div>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label" for="emailInput">
                                    Email
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input type="email" id="emailInput" class="form-control"
                                        placeholder="email@exemplo.com" required>

                                </div>

                            </div>

                                <div class="mb-3">

                                    <label class="form-label" for="senhaInput">
                                        Senha
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input type="password" id="senhaInput" class="form-control"
                                            placeholder="Digite uma senha" required>

                                    </div>

                                </div>

                            <button type="submit" class="btn btn-gradient w-100">
                                <i class="bi bi-person-plus-fill me-2"></i>
                                Cadastrar
                            </button>

                        </form>

                        <div class="text-center mt-4">
                            <span class="text-muted">
                                Já possui uma conta?
                            </span>
                            <br>

                            <a href="../login/login.html" class="btn btn-outline-primary mt-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Fazer login
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>


    <script src="../../assets/js/database.js"></script>
    <script src="../../assets/js/storage.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="cadastro.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
