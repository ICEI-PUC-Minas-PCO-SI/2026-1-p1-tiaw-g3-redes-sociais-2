<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - OnLife</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="perfil.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <main class="d-flex flex-grow-1">

        <!-- Sidebar -->
        <div class="col-md-2 p-0">
            <div id="sidebar-container"></div>
        </div>

        <!-- Conteúdo -->
        <div class="conteudo-principal perfil-page">

            <div class="titulo mb-4">
                <h1>Meu Perfil</h1>
                <p>Visualize e edite suas informações pessoais.</p>
            </div>

            <div class="perfil-container">

                <!-- Coluna Esquerda -->
                <div class="left">

                    <h4 class="section-title">Foto de Perfil</h4>

                    <div class="perfil-topo">

                        <!-- FOTO -->
                        <div class="foto"
                            onclick="document.getElementById('input-foto').click()"
                            style="cursor:pointer;">

                            <img id="foto-perfil"
                                src="../../assets/images/lucas.png"
                                alt="Foto de Perfil">

                            <input
                                type="file"
                                id="input-foto"
                                accept="image/*"
                                style="visibility:hidden;position:absolute;">

                        </div>

                        <!-- SCORE -->
                        <div class="score-card shadow-lg">

                            <div class="score-header">
                                OnLife Score
                            </div>

                            <div class="score-circle">

                                <svg viewBox="0 0 36 36">

                                    <path
                                        class="circle-bg"
                                        d="M18 2.0845
                                           a 15.9155 15.9155 0 0 1 0 31.831
                                           a 15.9155 15.9155 0 0 1 0 -31.831" />

                                    <path
                                        class="circle-progress"
                                        stroke-dasharray="71, 100"
                                        d="M18 2.0845
                                           a 15.9155 15.9155 0 0 1 0 31.831
                                           a 15.9155 15.9155 0 0 1 0 -31.831" />

                                </svg>

                                <div class="score-content">

                                    <span class="score-number">
                                        190
                                    </span>

                                    <span class="score-label">
                                        Excelente
                                    </span>

                                </div>

                            </div>

                            <div class="score-footer">

                                <div class="score-up">
                                    <i class="bi bi-arrow-up"></i>
                                    +20
                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- Informações -->

                    <div class="section-title">Nome</div>
                    <div class="info-box" id="campo-nome">@usuario</div>

                    <div class="section-title">E-mail</div>
                    <div class="info-box" id="campo-email">
                        exemplo@gmail.com
                    </div>

                    <button
                        id="btn-editar"
                        class="btn-editar"
                        onclick="ativarEdicao()">
                        Editar
                    </button>

                    <button
                        id="btn-salvar"
                        class="btn-salvar"
                        onclick="salvarEdicao()"
                        style="display:none;">
                        Salvar
                    </button>

                </div>

                <!-- Coluna Direita -->
                <div class="right">

                    <div class="card">
                        <h3>Seus interesses</h3>
                        <ul id="lista-interesses"></ul>
                    </div>

                    <div class="card">
                        <h3>Redes sociais que mais usa</h3>
                        <ul id="lista-redes"></ul>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../../assets/js/database.js"></script>
    <script src="../../assets/js/storage.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="score.js"></script>
    <script src="script-gustavo.js"></script>
    <script src="script-pedrol.js"></script>
    <script src="../sidebar/sidebar.js"></script>

</body>

</html>
