<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - OnLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="perfil.css">
</head>

<body class="d-flex flex-column min-vh-100">


    <main class="d-flex flex-grow-1">

        <!-- sidebar -->
        <div class="col-md-2 p-0">
            <div id="sidebar-container"></div>
        </div>

        <section class="perfil-page px-5">

            <h1>Meu perfil</h1>
            <h2>Informações do Usuário</h2>

            <div class="perfil-container">

                <!--coluna esquerda-->

                <!--foto-->
                <div class="left">

                    <div class="section-title">Foto de Perfil</div>
                    <h6>click na foto para editar</h6>
                    <div class="perfil-topo">

                        <!-- FOTO -->
                        <div class="foto" onclick="document.getElementById('input-foto').click()"
                            style="cursor: pointer;">
                            <img id="foto-perfil" src="../../assets/images/lucas.png" alt="Foto de Perfil">

                            <input type="file" id="input-foto" accept="image/*"
                                style="visibility: hidden; position: absolute;">
                        </div>

                        <!-- SCORE -->
                        <div class="score-card shadow-lg">

                            <div class="score-header">
                                OnLife Score
                            </div>

                            <div class="score-circle">

                                <svg viewBox="0 0 36 36">

                                    <!-- fundo -->
                                    <path class="circle-bg" d="M18 2.0845
                    a 15.9155 15.9155 0 0 1 0 31.831
                    a 15.9155 15.9155 0 0 1 0 -31.831" />

                                    <!-- progresso -->
                                    <path class="circle-progress" stroke-dasharray="71, 100" d="M18 2.0845
                    a 15.9155 15.9155 0 0 1 0 31.831
                    a 15.9155 15.9155 0 0 1 0 -31.831" />

                                </svg>

                                <div class="score-content">

                                    <span class="score-number">
                                        710
                                    </span>

                                    <span class="score-label">
                                        Excelente
                                    </span>

                                </div>

                            </div>

                            <div class="score-footer">

                                <div class="score-up">
                                    <i class="bi bi-arrow-up"></i>
                                    +20
                                </div>

                            </div>

                        </div>

                    </div>

                    <!--info-->
                    <div class="section-title">Nome</div>
                    <div class="info-box" id="campo-nome">@usuario</div>

                    <div class="section-title">E-mail</div>
                    <div class="info-box" id="campo-email">exemplo@gmail.com</div>

                    <div class="section-title">Redes Sociais</div>
                    <h6>Instagram</h6>
                    <div class="info-box" id="campo-instagram">@usuario</div>
                    <h6>Facebook</h6>
                    <div class="info-box" id="campo-facebook">@usuario</div>
                    <h6>X/Twitter</h6>
                    <div class="info-box" id="campo-twitter">@usuario</div>

                    <button id="btn-editar" class="btn-editar" onclick="ativarEdicao()">Editar</button>
                    <button id="btn-salvar" class="btn-salvar" onclick="salvarEdicao()"
                        style="display: none;">Salvar</button>

                </div>


                <!--coluna direita-->

                <!--cards-->
                <div class="right">

                    <div class="card">
                        <h3>Seus interesses</h3>
                        <ul id="lista-interesses"></ul>
                    </div>

                    <div class="card">
                        <h3>Redes sociais que mais usa</h3>
                        <ul id="lista-redes"></ul>
                    </div>

                </div>



            </div>


        </section>

    </main>

    <script src="../sidebar/sidebar.js"></script>
</body>

</html>>
